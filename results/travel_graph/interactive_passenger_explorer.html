let currentJourneyIndex = 0;
let journeyGroup = null;
let rng = 0;

const SEGMENT_COLOURS = {
  "start_walk": "#1f77b4",
  "end_walk": "#1f77b4",
  "direct": "#7f7f7f",
  "ride": "#d62728",
  "wait": "#2ca02c",
  "alight": "#9467bd",
  "transfer": "#ff7f0e",
};

const map = L.map("map");
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
  attribution: "&copy; OpenStreetMap contributors",maxZoom:19
}).addTo(map);

// Draw routes in background
const routeGroup = L.layerGroup().addTo(map);
routeLayers.forEach(r => {
  if (r.coords.length < 2) return;
  L.polyline(r.coords, {
    color: r.colour, weight: 4, opacity: 0.3, dashArray: "8 5"
  }).bindPopup(`<b>Route ${r.id}</b>`).addTo(routeGroup);
});

// Initialize journey group
journeyGroup = L.layerGroup().addTo(map);

function updateJourney(journeyIndex) {
  if (journeyIndex < 0 || journeyIndex >= preloadedJourneys.length) {
    alert('No journey at index ' + journeyIndex);
    return;
  }
  currentJourneyIndex = journeyIndex;
  const j = preloadedJourneys[journeyIndex];
  
  journeyGroup.clearLayers();
  
  const segments = j.segments || [];
  if (segments.length === 0) {
    document.getElementById('journey-info').textContent = 'No path available';
    return;
  }
  
  // Draw segments
  segments.forEach(s => {
    const weight = (s.edge_type === "ride") ? 6 : 4;
    const popup = `<b>${s.edge_type.replace(/_/g," ")}</b><br/>` +
                  `ID: ${s.edge_id}<br/>dist: ${s.dist} m`;
    L.polyline(s.coords, {
      color: SEGMENT_COLOURS[s.edge_type] || "#333",
      weight: weight,
      opacity: 0.9
    }).bindPopup(popup).addTo(journeyGroup);
  });
  
  // Origin/destination markers
  const origin = segments[0].coords[0];
  const dest = segments[segments.length - 1].coords[1];
  
  L.marker(origin, {
    icon: L.divIcon({className:"",html:
      '<div style="width:14px;height:14px;border-radius:50%;background:#2ca02c;border:2px solid #fff;box-shadow:0 0 4px rgba(0,0,0,0.5)"></div>'
    })
  }).bindPopup("<b>Origin</b>").addTo(journeyGroup);
  
  L.marker(dest, {
    icon: L.divIcon({className:"",html:
      '<div style="width:14px;height:14px;border-radius:50%;background:#d62728;border:2px solid #fff;box-shadow:0 0 4px rgba(0,0,0,0.5)"></div>'
    })
  }).bindPopup("<b>Destination</b>").addTo(journeyGroup);
  
  // Summary
  const typeCounts = {};
  let walkDist = 0, rideDist = 0;
  segments.forEach(s => {
    typeCounts[s.edge_type] = (typeCounts[s.edge_type] || 0) + 1;
    if (s.edge_type.includes('walk') || s.edge_type === 'direct') walkDist += s.dist;
    if (s.edge_type === 'ride') rideDist += s.dist;
  });
  
  const nTransfers = typeCounts['transfer'] || 0;
  document.getElementById('journey-info').textContent = 
    `Journey ${currentJourneyIndex + 1}: Walk ${walkDist.toFixed(0)}m | Ride ${rideDist.toFixed(0)}m | Transfers: ${nTransfers}`;
  
  // Fit bounds
  const allCoords = segments.flatMap(s => s.coords);
  if (allCoords.length > 1) map.fitBounds(allCoords, {padding:[50,50]});
}

function nextJourney() {
  updateJourney((currentJourneyIndex + 1) % preloadedJourneys.length);
}

function previousJourney() {
  updateJourney((currentJourneyIndex - 1 + preloadedJourneys.length) % preloadedJourneys.length);
}

function generateRandomJourney() {
  const j = preloadedJourneys[Math.floor(Math.random() * preloadedJourneys.length)];
  alert('Generated random journey: ' + j.origin + ' → ' + j.dest);
  updateJourney(preloadedJourneys.indexOf(j));
}

// Load first journey
if (preloadedJourneys.length > 0) updateJourney(0);
</script>
