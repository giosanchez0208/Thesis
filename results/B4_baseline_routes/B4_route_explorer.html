<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  body {
    margin: 0;
    background: white;
    color: #111827;
    font-family: Arial, sans-serif;
  }
  #toolbar {
    position: sticky;
    top: 0;
    background: white;
    border-bottom: 1px solid #e5e7eb;
    padding: 10px 12px;
    z-index: 10;
  }
  #title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  #controls {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
  }
  .route-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 8px;
    border: 1px solid #cbd5e1;
    border-radius: 999px;
    background: #f8fafc;
    font-size: 12px;
  }
  #buttons {
    margin-left: auto;
    display: flex;
    gap: 8px;
  }
  button {
    border: 1px solid #cbd5e1;
    background: #fff;
    border-radius: 8px;
    padding: 6px 10px;
    cursor: pointer;
  }
  #summary {
    padding: 10px 12px;
    font-size: 13px;
    color: #334155;
  }
  #mapwrap {
    padding: 12px;
  }
  svg {
    width: 100%;
    height: auto;
    border: 1px solid #e5e7eb;
    background: white;
  }
  .road-line {
    stroke: #d1d5db;
    stroke-width: 1;
    opacity: 0.18;
  }
  .route-line {
    stroke: #2563eb;
    stroke-width: 3;
    fill: none;
  }
  .route-layer {
    opacity: 1;
    transition: opacity 0.15s ease;
  }
  .route-layer.is-hidden {
    opacity: 0;
    pointer-events: none;
  }
  .route-label {
    font-size: 13px;
    fill: #111827;
    paint-order: stroke;
    stroke: white;
    stroke-width: 3px;
    stroke-linejoin: round;
  }
  .route-node {
    fill: #2563eb;
    stroke: white;
    stroke-width: 2px;
  }
  .route-dot {
    fill: #ef4444;
    stroke: white;
    stroke-width: 2px;
    filter: drop-shadow(0 0 4px rgba(239,68,68,0.7));
  }
  table {
    border-collapse: collapse;
    margin-top: 8px;
    font-size: 12px;
  }
  th, td {
    border: 1px solid #e5e7eb;
    padding: 4px 8px;
    text-align: left;
  }
</style>

    const svg = document.getElementById("routeSvg");
    let currentIndex = 0;

    let timer = null;

    function clearRouteGroup() {
      while (routeGroup.firstChild) routeGroup.removeChild(routeGroup.firstChild);
    }

    function makeSvgEl(tag, attrs) {
      const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
      Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
      return el;
    }

    function renderSingleRoute() {

      const route = routes[currentIndex];

      const g = makeSvgEl("g", { id: `route-${route.id}`, class: "route-layer" });
      g.appendChild(makeSvgEl("polyline", {

        const g = makeSvgEl("g", { id: `route-${route.id}`, class: "route-layer" });
