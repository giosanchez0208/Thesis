place_query: "Iligan City, Lanao del Norte, Philippines"

paths:
  boundary_geojson: "data/raw/boundaries/iligan_boundary.geojson"
  graphs_dir: "data/processed/graphs"
  processed_dir: "data/processed"
  figures_dir: "results/figures"
  osmnx_cache_dir: "data/raw/osm_cache"

osmnx:
  use_cache: true
  log_console: true

network:
  walk_type: "walk"
  drive_type: "drive"

cleaning:
  simplify: true
  consolidate_intersections: true
  tolerance_m: 8.0
  keep_largest_component: true

# ✅ ADD THESE (fixes polygon edge cases)
fallback:
  dist_m: 25000          # radius used in fallback graph_from_point()

boundary:
  min_area_km2: 20       # if boundary is smaller than this, we auto-expand
  buffer_m: 50           # small buffer to avoid edge truncation problems

travel_graph:
  include_direct_edges: true
  weights:
    beta_walk: 1.0
    beta_ride: 1.0
    beta_wait: 5.0
    beta_transfer: 8.0
    beta_alight: 0.0
    beta_direct: 0.0

routes:
  routes_json: "data/raw/routes/jeepney_routes.json"
  snap_to_walk_graph: true
  ride_distance_method: "drive_shortest_path"